<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Smart POS Pro V8.2 - Cloud & PromptPay Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart POS">
  <link class="rounded-xl" rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10398/10398642.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
   
  <style>
    body { 
      font-family: 'Sarabun', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none; 
      font-weight: 500; 
    }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .btn-touch { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.15s, opacity 0.15s; }
    .btn-touch:active { transform: scale(0.92); }
    .fade-in { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .pin-dot-active { background-color: #6366f1 !important; transform: scale(1.35); box-shadow: 0 0 15px rgba(99, 102, 241, 0.8); border-color: #6366f1 !important; }
    .p-card { transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); border: 2px solid transparent; cursor: pointer; border-radius: 1.5rem; overflow: hidden; }
    .p-card:active { border-color: #6366f1; background: #f1f5f9; }
    .tab-btn { border-bottom: 4px solid transparent; opacity: 0.5; transition: all 0.2s; }
    .tab-btn.active { border-bottom-color: #4f46e5; opacity: 1; color: #4f46e5; }
    @media print {
      @page { size: 58mm auto; margin: 0; }
      body * { visibility: hidden; }
      #receipt-preview-content, #receipt-preview-content * { visibility: visible; }
      #receipt-preview-content { position: absolute; left: 0; top: 0; width: 58mm; color: black; font-family: 'Courier New', Courier, monospace, 'Sarabun'; font-size: 10px; line-height: 1.3; padding: 1mm; margin: 0; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-safe">
  
  <div id="toast-msg" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-900/95 backdrop-blur-md text-white px-6 py-3.5 rounded-full shadow-2xl z-[99999] transition-all duration-300 translate-y-24 opacity-0">
    <span id="toast-icon" class="text-lg">✅</span> <span id="toast-text">ข้อความ</span>
  </div>

  <div id="loading-overlay" class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-slate-950/85 backdrop-blur-md text-white hidden">
    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p id="loading-text" class="font-bold tracking-widest text-sm text-center px-6">กำลังทำงาน...</p>
  </div>
 
  <div id="lock-screen" class="fixed inset-0 z-[9999] bg-gradient-to-b from-slate-950 to-slate-900 flex flex-col items-center justify-between text-white p-6 pb-12 transition-all duration-500 overflow-hidden opacity-0">
    <div class="w-full max-w-sm text-center mt-6 fade-in">
      <div class="text-6xl mb-3 drop-shadow-lg">☁️</div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Smart POS Pro</h1>
      <p class="text-slate-400 tracking-wider text-[10px] mt-1.5 uppercase font-bold">V8.2 - Cloud Database & PromptPay</p>
      <div class="mt-4 flex justify-center gap-1.5">
         <span class="text-[9px] bg-indigo-500/20 text-indigo-300 px-2.5 py-0.5 rounded-full border border-indigo-500/20 font-bold uppercase">Owner</span>
         <span class="text-[9px] bg-amber-500/20 text-amber-300 px-2.5 py-0.5 rounded-full border border-amber-500/20 font-bold uppercase">Manager</span>
         <span class="text-[9px] bg-emerald-500/20 text-emerald-300 px-2.5 py-0.5 rounded-full border border-emerald-500/20 font-bold uppercase">Cashier</span>
      </div>
    </div>

    <div class="w-full max-w-xs flex flex-col items-center gap-4 my-auto py-6">
      <div class="text-xs font-semibold text-slate-300">ระบุรหัส PIN 4 หลักเพื่อเริ่มต้นระบบงาน</div>
      <div id="pin-display-area" class="flex gap-6 h-10 items-center justify-center">
        <div class="w-4.5 h-4.5 rounded-full border-2 border-slate-700 bg-slate-900/50 transition-all duration-200"></div>
        <div class="w-4.5 h-4.5 rounded-full border-2 border-slate-700 bg-slate-900/50 transition-all duration-200"></div>
        <div class="w-4.5 h-4.5 rounded-full border-2 border-slate-700 bg-slate-900/50 transition-all duration-200"></div>
        <div class="w-4.5 h-4.5 rounded-full border-2 border-slate-700 bg-slate-900/50 transition-all duration-200"></div>
      </div>
    </div>

    <div class="w-full max-w-xs grid grid-cols-3 gap-4 text-center mt-auto">
      <button onclick="pressPin('1')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">1</button>
      <button onclick="pressPin('2')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">2</button>
      <button onclick="pressPin('3')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">3</button>
      <button onclick="pressPin('4')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">4</button>
      <button onclick="pressPin('5')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">5</button>
      <button onclick="pressPin('6')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">6</button>
      <button onclick="pressPin('7')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">7</button>
      <button onclick="pressPin('8')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">8</button>
      <button onclick="pressPin('9')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">9</button>
      <button onclick="togglePinVisibility()" id="btn-pin-eye" class="h-16 rounded-2xl bg-slate-900/40 text-slate-400 text-lg font-bold btn-touch flex items-center justify-center">👁️</button>
      <button onclick="pressPin('0')" class="h-16 rounded-2xl bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/5 text-2xl font-bold btn-touch flex items-center justify-center">0</button>
      <button onclick="clearPin()" class="h-16 rounded-2xl bg-rose-500/20 text-rose-300 text-sm font-black btn-touch flex items-center justify-center">ลบ</button>
    </div>
  </div>
 
  <div id="custom-dialog-modal" class="fixed inset-0 z-[10000] bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl text-center fade-in">
      <div id="dialog-icon" class="text-5xl mb-3">⚠️</div>
      <h3 id="dialog-title" class="text-base font-black text-slate-800 mb-1.5">แจ้งเตือน</h3>
      <p id="dialog-message" class="text-xs text-slate-500 mb-5 font-medium whitespace-pre-line">รายละเอียด</p>
      <div id="dialog-input-container" class="mb-5 hidden">
        <input type="text" id="dialog-input-field" class="w-full bg-slate-50 border-2 border-slate-200 p-2.5 rounded-xl outline-none font-bold text-center focus:border-indigo-500 text-sm">
      </div>
      <div class="flex gap-2 justify-center" id="dialog-buttons-container"></div>
    </div>
  </div>
  
  <script>
    // ==================== SECURITY & STATE ====================
    const roundAmt = (num) => Math.round((parseFloat(num) || 0) * 100) / 100;
    const sanitizeInput = (input) => String(input).replace(/[<>\"']/g, '');
 
    const DB_DEFAULT = {
      storeName: "Smart POS",
      pins: { owner: null, manager: null, cashier: null },
      settings: { autoSync: true, displayDays: 3, keepDays: 30, taxPayerName: "", taxPayerId: "", vatType: "NONE", promptPayId: "" },
      categories: [{ id: 'CAT-DEFAULT', name: 'ทั่วไป', icon: '📦', color: '#6366f1' }],
      products: {}, customers: {}, bills: [], holdBills: [], shifts: [], pos: [],
      counters: { product: 1, customer: 1, category: 2, bill: 1, po: 1, barcode: 1000001, variant: 1 },
      pendingSyncs: [], reportSummary: { yearRevenue: 0, yearCost: 0 }
    };
     
    let db = JSON.parse(JSON.stringify(DB_DEFAULT));
    let currentUserRole = "CASHIER";
    let tempPin = "";
    let isPinVisible = false;
     
    const DB_KEY = "pos_secured_pro_db_v82_cloud";

    // ==================== INITIALIZATION ====================
    async function initApp() {
      try {
        document.getElementById('loading-text').innerText = "กำลังเชื่อมโยงฐานข้อมูล...";
        document.getElementById('loading-overlay').classList.remove('hidden');

        const storedDb = await localforage.getItem(DB_KEY);
        if (storedDb) {
          db = { ...DB_DEFAULT, ...storedDb };
          showToast("✅ โหลดข้อมูลเรียบร้อย");
        } else {
          db = JSON.parse(JSON.stringify(DB_DEFAULT));
          await persist();
        }

        db.counters = { ...DB_DEFAULT.counters, ...(db.counters || {}) };
        db.pins = { ...DB_DEFAULT.pins, ...(db.pins || {}) };

        startClock();
        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('lock-screen').style.display = 'flex';
        setTimeout(() => document.getElementById('lock-screen').style.opacity = '1', 50);
      } catch (e) {
        console.error("Init Error", e);
        showToast("❌ เกิดข้อผิดพลาดในการเริ่มต้น", true);
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }
    
    window.onload = initApp;

    // ==================== PIN AUTHENTICATION ====================
    function pressPin(digit) {
      if (tempPin.length < 4) {
        tempPin += digit;
        updatePinDisplay();
        playSynthesizedSound([800], [50]);
      }
      if (tempPin.length === 4) {
        validatePin();
      }
    }

    function updatePinDisplay() {
      const dots = document.querySelectorAll('#pin-display-area div');
      dots.forEach((dot, idx) => {
        if (idx < tempPin.length) {
          dot.classList.add('pin-dot-active');
        } else {
          dot.classList.remove('pin-dot-active');
        }
      });
    }

    function clearPin() {
      tempPin = "";
      updatePinDisplay();
      playSynthesizedSound([400], [50]);
    }

    function togglePinVisibility() {
      isPinVisible = !isPinVisible;
      const btn = document.getElementById('btn-pin-eye');
      btn.innerText = isPinVisible ? "👀" : "👁️";
    }

    function validatePin() {
      const { owner, manager, cashier } = db.pins;
      
      if (!owner) {
        const newPin = prompt("🔑 ตั้งค่า PIN Owner (ผู้ดูแล) - 4 หลัก:");
        if (newPin && newPin.length === 4 && /^\d+$/.test(newPin)) {
          db.pins.owner = newPin;
          persist();
          showToast("✅ ตั้งค่า PIN Owner เรียบร้อย");
          clearPin();
        } else {
          showToast("❌ PIN ต้องเป็นตัวเลข 4 หลัก", true);
          clearPin();
        }
        return;
      }

      if (tempPin === owner) {
        currentUserRole = "OWNER";
        unlockApp();
      } else if (tempPin === manager) {
        currentUserRole = "MANAGER";
        unlockApp();
      } else if (tempPin === cashier) {
        currentUserRole = "CASHIER";
        unlockApp();
      } else {
        showToast("❌ PIN ไม่ถูกต้อง", true);
        tempPin = "";
        updatePinDisplay();
        playSynthesizedSound([300, 300], [100, 100]);
      }
    }

    function unlockApp() {
      playSynthesizedSound([800, 1000], [100, 100]);
      document.getElementById('lock-screen').style.display = 'none';
      showToast(`✅ ยินดีต้อนรับ ${currentUserRole}`);
      
      // Show success message
      const modal = document.getElementById('custom-dialog-modal');
      document.getElementById('dialog-icon').innerText = '🎉';
      document.getElementById('dialog-title').innerText = 'Smart POS Pro';
      document.getElementById('dialog-message').innerText = `ผู้ใช้: ${currentUserRole}\n\nระบบหลัก: อยู่ระหว่างพัฒนา\n\n✅ PIN Authentication\n✅ Local Storage\n✅ Security`;
      
      const buttonsContainer = document.getElementById('dialog-buttons-container');
      buttonsContainer.innerHTML = '';
      const btn = document.createElement('button');
      btn.className = 'px-6 py-2 rounded-lg font-bold text-sm bg-indigo-600 text-white btn-touch';
      btn.innerText = 'ปิด';
      btn.onclick = () => {
        document.getElementById('custom-dialog-modal').classList.add('hidden');
      };
      buttonsContainer.appendChild(btn);
      
      document.getElementById('custom-dialog-modal').classList.remove('hidden');
    }

    // ==================== UI FUNCTIONS ====================
    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast-msg');
      if (!toast) return;
      toast.querySelector('#toast-text').innerText = msg;
      toast.querySelector('#toast-icon').innerText = isError ? '❌' : '✅';
      toast.classList.remove('translate-y-24', 'opacity-0');
      setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 2500);
    }

    function startClock() {
      setInterval(() => {
        const now = new Date();
        // Clock display logic here
      }, 1000);
    }

    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) { 
        audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
      }
      return audioCtx;
    }

    function playSynthesizedSound(freqs, durations, type = 'sine', volume = 0.08) {
      try {
        const ctx = getAudioContext();
        if (ctx.state === 'suspended') ctx.resume();
        let time = ctx.currentTime;
        freqs.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, time);
          gain.gain.setValueAtTime(volume, time);
          gain.gain.exponentialRampToValueAtTime(0.01, time + durations[idx] / 1000);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(time);
          osc.stop(time + durations[idx] / 1000);
          time += durations[idx] / 1000;
        });
      } catch(e) { 
        console.log('Audio disabled'); 
      }
    }

    // ==================== DATA PERSISTENCE ====================
    async function persist() { 
      try { 
        const limitMs = Date.now() - ((db.settings.keepDays || 30) * 86400000);
        db.bills = db.bills.filter(b => new Date(b.date).getTime() > limitMs);
        await localforage.setItem(DB_KEY, JSON.parse(JSON.stringify(db))); 
      } catch(e) { 
        console.error("Storage Error", e); 
      } 
    }

  </script>
</body>
</html>
